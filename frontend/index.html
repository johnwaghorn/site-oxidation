<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/site-oxidation.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Oxidation</title>
    <script>
      (function () {
        var prePaintThemeStorageKey = "site-oxidation-theme";
        var theme = null;
        try {
          theme = localStorage.getItem(prePaintThemeStorageKey);
        } catch (_storageUnavailable) {}
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        } else if (theme !== "light" && theme !== "dark") {
          theme = "dark";
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
